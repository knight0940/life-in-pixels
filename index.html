<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life in Pixels — 你的人生像素</title>
<meta name="description" content="每个格子代表你生命中的一周。直观感受时间的流逝，珍惜每一刻。">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a28;
    --text: #e0e0e0;
    --text-dim: #666;
    --accent: #ff6b6b;
    --accent2: #4ecdc4;
    --accent3: #ffe66d;
    --accent4: #a29bfe;
    --pixel-size: 10px;
    --gap: 2px;
    --stage-childhood: #ff9ff3;
    --stage-student: #54a0ff;
    --stage-work: #5f27cd;
    --stage-retired: #01a3a4;
    --stage-unlived: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

  .header { text-align: center; margin-bottom: 50px; }
  .header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 15px;
    line-height: 1.6;
  }
  .header .subtitle { font-size: 16px; color: var(--text-dim); font-weight: 300; }

  .input-section {
    text-align: center;
    margin-bottom: 40px;
    padding: 30px;
    background: var(--bg2);
    border-radius: 12px;
    border: 1px solid #222;
  }
  .input-section label { font-size: 14px; color: var(--text-dim); display: block; margin-bottom: 15px; }
  .input-row { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
  .input-row input[type="date"], .input-row select {
    background: #1a1a2e; border: 2px solid #333; color: var(--text);
    padding: 12px 20px; border-radius: 8px; font-size: 16px;
    font-family: 'Noto Sans SC', sans-serif; outline: none; transition: border-color 0.3s;
  }
  .input-row input:focus, .input-row select:focus { border-color: var(--accent2); }
  .input-row input[type="number"] {
    background: #1a1a2e; border: 2px solid #333; color: var(--text);
    padding: 12px 16px; border-radius: 8px; font-size: 16px; width: 100px;
    font-family: 'Noto Sans SC', sans-serif; outline: none;
  }

  .btn {
    background: linear-gradient(135deg, var(--accent), #ee5a24);
    color: white; border: none; padding: 12px 30px; border-radius: 8px;
    font-size: 16px; font-family: 'Noto Sans SC', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,107,107,0.4); }
  .btn:active { transform: translateY(0); }

  .stats-bar {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px; margin-bottom: 30px; opacity: 0; transition: opacity 0.5s;
  }
  .stats-bar.visible { opacity: 1; }
  .stat-card {
    background: var(--bg2); border: 1px solid #222; border-radius: 10px;
    padding: 20px; text-align: center; transition: transform 0.3s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card .number { font-family: 'Press Start 2P', monospace; font-size: 22px; margin-bottom: 8px; }
  .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card.lived .number { color: var(--accent); }
  .stat-card.remaining .number { color: var(--accent2); }
  .stat-card.percentage .number { color: var(--accent3); }
  .stat-card.heartbeats .number { color: #ff6348; }
  .stat-card.days .number { color: var(--accent4); }

  .grid-section { margin-bottom: 40px; opacity: 0; transition: opacity 0.5s 0.2s; }
  .grid-section.visible { opacity: 1; }
  .grid-container {
    background: var(--bg2); border-radius: 12px; border: 1px solid #222;
    padding: 25px; overflow-x: auto;
  }

  .year-labels { display: flex; margin-bottom: 5px; padding-left: 45px; }
  .year-label {
    font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim);
    width: calc(var(--pixel-size) * 52 + var(--gap) * 51);
    min-width: calc(var(--pixel-size) * 52 + var(--gap) * 51);
    text-align: left; padding-bottom: 3px;
  }

  .grid-row { display: flex; align-items: center; margin-bottom: var(--gap); }
  .row-label {
    font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim);
    width: 40px; min-width: 40px; text-align: right; padding-right: 5px;
  }

  .pixel {
    width: var(--pixel-size); height: var(--pixel-size); min-width: var(--pixel-size);
    border-radius: 2px; background: var(--stage-unlived);
    transition: all 0.15s; cursor: pointer; position: relative;
  }
  .pixel:hover { transform: scale(1.8); z-index: 10; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
  .pixel + .pixel { margin-left: var(--gap); }
  .pixel.childhood { background: var(--stage-childhood); }
  .pixel.student { background: var(--stage-student); }
  .pixel.work { background: var(--stage-work); }
  .pixel.retired { background: var(--stage-retired); }
  .pixel.milestone { background: var(--accent3) !important; box-shadow: 0 0 6px var(--accent3); }
  .pixel.current { animation: pulse 1.5s infinite; background: var(--accent) !important; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent); }
    50% { box-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); }
  }

  .tooltip {
    position: fixed; background: #1a1a2e; border: 1px solid var(--accent2);
    border-radius: 8px; padding: 12px 16px; font-size: 13px;
    pointer-events: none; z-index: 1000; display: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5); max-width: 250px;
  }
  .tooltip .week-num { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2); margin-bottom: 5px; }
  .tooltip .age-info { color: var(--text-dim); font-size: 12px; }
  .tooltip .stage-info { margin-top: 5px; font-size: 11px; color: var(--accent3); }

  .legend {
    display: flex; justify-content: center; gap: 25px; margin-bottom: 30px;
    flex-wrap: wrap; opacity: 0; transition: opacity 0.5s 0.3s;
  }
  .legend.visible { opacity: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
  .legend-color { width: 14px; height: 14px; border-radius: 3px; }

  /* Activity breakdown */
  .activity-section {
    background: var(--bg2); border-radius: 12px; border: 1px solid #222;
    padding: 25px; margin-bottom: 30px; opacity: 0; transition: opacity 0.5s 0.35s;
  }
  .activity-section.visible { opacity: 1; }
  .activity-section h3 {
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    color: var(--accent2); margin-bottom: 20px; text-align: center;
  }
  .activity-bars { display: flex; flex-direction: column; gap: 12px; }
  .activity-bar {
    display: flex; align-items: center; gap: 15px;
  }
  .activity-bar .name {
    width: 80px; min-width: 80px; font-size: 13px; color: var(--text-dim); text-align: right;
  }
  .activity-bar .bar-container {
    flex: 1; height: 24px; background: var(--bg); border-radius: 4px; overflow: hidden;
    position: relative;
  }
  .activity-bar .bar-fill {
    height: 100%; border-radius: 4px; transition: width 1.5s ease-out;
    display: flex; align-items: center; padding-left: 10px;
    font-size: 11px; font-weight: 700; color: white; white-space: nowrap;
  }
  .activity-bar .weeks {
    width: 90px; min-width: 90px; font-size: 12px; color: var(--text-dim); text-align: left;
  }

  .milestone-section {
    background: var(--bg2); border-radius: 12px; border: 1px solid #222;
    padding: 25px; margin-bottom: 30px; opacity: 0; transition: opacity 0.5s 0.4s;
  }
  .milestone-section.visible { opacity: 1; }
  .milestone-section h3 {
    font-family: 'Press Start 2P', monospace; font-size: 12px;
    color: var(--accent3); margin-bottom: 15px;
  }
  .milestone-input-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
  .milestone-input-row input {
    background: #1a1a2e; border: 1px solid #333; color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif; outline: none;
  }
  .milestone-input-row input[type="text"] { flex: 1; min-width: 150px; }
  .milestone-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .milestone-tag {
    background: rgba(255,230,109,0.1); border: 1px solid var(--accent3);
    color: var(--accent3); padding: 5px 12px; border-radius: 20px;
    font-size: 12px; display: flex; align-items: center; gap: 6px;
  }
  .milestone-tag .remove { cursor: pointer; opacity: 0.6; font-size: 14px; }
  .milestone-tag .remove:hover { opacity: 1; }

  .quote-section { text-align: center; margin-top: 50px; padding: 30px; opacity: 0; transition: opacity 0.5s 0.5s; }
  .quote-section.visible { opacity: 1; }
  .quote-section .quote { font-size: 20px; font-style: italic; color: var(--text-dim); max-width: 600px; margin: 0 auto 10px; line-height: 1.6; }
  .quote-section .author { font-size: 14px; color: var(--accent2); }

  .share-section { text-align: center; margin-top: 30px; opacity: 0; transition: opacity 0.5s 0.6s; }
  .share-section.visible { opacity: 1; }
  .share-btn {
    background: transparent; border: 2px solid var(--accent2); color: var(--accent2);
    padding: 10px 25px; border-radius: 8px; font-size: 14px; cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif; transition: all 0.3s; margin: 5px;
  }
  .share-btn:hover { background: var(--accent2); color: var(--bg); }

  .fade-in { animation: fadeIn 0.6s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .footer { text-align: center; margin-top: 50px; padding: 20px; color: var(--text-dim); font-size: 12px; }
  .footer a { color: var(--accent2); text-decoration: none; }

  @media (max-width: 768px) {
    .header h1 { font-size: 18px; }
    :root { --pixel-size: 7px; --gap: 1px; }
    .year-label, .row-label { font-size: 6px; }
    .row-label { width: 25px; min-width: 25px; }
    .year-labels { padding-left: 30px; }
    .stat-card .number { font-size: 16px; }
    .activity-bar .name { width: 60px; min-width: 60px; font-size: 11px; }
    .activity-bar .weeks { width: 70px; min-width: 70px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header fade-in">
    <h1>LIFE IN PIXELS</h1>
    <p class="subtitle">每个格子代表你生命中的一周 · 直观感受时间的流逝</p>
  </div>

  <div class="input-section fade-in">
    <label>输入你的生日和期望寿命，看看你的人生还剩多少格子</label>
    <div class="input-row">
      <input type="date" id="birthday" value="1995-06-15">
      <input type="number" id="lifespan" value="80" min="1" max="150" placeholder="期望寿命">
      <span style="color: var(--text-dim); font-size: 14px;">岁</span>
      <button class="btn" onclick="generateGrid()">生成我的人生</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card lived">
      <div class="number" id="statLived">0</div>
      <div class="label">已度过（周）</div>
    </div>
    <div class="stat-card remaining">
      <div class="number" id="statRemaining">0</div>
      <div class="label">剩余（周）</div>
    </div>
    <div class="stat-card percentage">
      <div class="number" id="statPercentage">0%</div>
      <div class="label">人生进度</div>
    </div>
    <div class="stat-card days">
      <div class="number" id="statDays">0</div>
      <div class="label">已活天数</div>
    </div>
    <div class="stat-card heartbeats">
      <div class="number" id="statHeartbeats">0</div>
      <div class="label">约心跳次数（亿）</div>
    </div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-childhood);"></div><span>童年 (0-12)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-student);"></div><span>学生 (13-22)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-work);"></div><span>工作 (23-60)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-retired);"></div><span>退休 (60+)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--accent3); box-shadow: 0 0 4px var(--accent3);"></div><span>里程碑</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-unlived); border: 1px solid #333;"></div><span>未经历</span></div>
  </div>

  <div class="grid-section" id="gridSection">
    <div class="grid-container">
      <div class="year-labels" id="yearLabels"></div>
      <div id="grid"></div>
    </div>
  </div>

  <!-- Activity Breakdown -->
  <div class="activity-section" id="activitySection">
    <h3>⏰ 你的时间都去哪了？（已度过的时间估算）</h3>
    <div class="activity-bars" id="activityBars"></div>
  </div>

  <div class="milestone-section" id="milestoneSection">
    <h3>⭐ 添加人生里程碑</h3>
    <div class="milestone-input-row">
      <input type="date" id="milestoneDate">
      <input type="text" id="milestoneText" placeholder="事件描述（如：大学毕业）">
      <button class="btn" onclick="addMilestone()" style="padding: 8px 20px; font-size: 14px;">添加</button>
    </div>
    <div class="milestone-list" id="milestoneList"></div>
  </div>

  <div class="quote-section" id="quoteSection">
    <div class="quote" id="quote"></div>
    <div class="author" id="quoteAuthor"></div>
  </div>

  <div class="share-section" id="shareSection">
    <button class="share-btn" onclick="shareResult()">📊 复制分享</button>
    <button class="share-btn" onclick="downloadImage()">📸 保存图片</button>
    <button class="share-btn" onclick="resetAll()">🔄 重新开始</button>
  </div>

  <div class="footer">
    <p>Life in Pixels — 珍惜每一周 ❤️ | <a href="https://github.com/knight0940/life-in-pixels" target="_blank">GitHub</a></p>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="week-num" id="tooltipWeek"></div>
  <div class="age-info" id="tooltipAge"></div>
  <div class="stage-info" id="tooltipStage"></div>
</div>

<script>
  const WEEKS_PER_YEAR = 52;
  const STAGES = [
    { name: '童年', maxAge: 12, class: 'childhood', color: '#ff9ff3' },
    { name: '学生', maxAge: 22, class: 'student', color: '#54a0ff' },
    { name: '工作', maxAge: 60, class: 'work', color: '#5f27cd' },
    { name: '退休', maxAge: 999, class: 'retired', color: '#01a3a4' }
  ];

  const QUOTES = [
    { text: "你不能控制生命的长度，但可以拓展它的宽度。", author: "佚名" },
    { text: "人生天地之间，若白驹过隙，忽然而已。", author: "庄子" },
    { text: "把每一天当作生命的最后一天来过，终有一天你会自在从容。", author: "乔布斯" },
    { text: "不要等待，时机永远不会恰到好处。", author: "拿破仑·希尔" },
    { text: "生命的价值不在于活了多少天，而在于我们如何度过这些日子。", author: "加缪" },
    { text: "一万年太久，只争朝夕。", author: "毛泽东" },
    { text: "逝者如斯夫，不舍昼夜。", author: "孔子" },
    { text: "你所浪费的今天，是昨天死去的人奢望的明天。", author: "佚名" }
  ];

  // Average time spent on activities (percentage of waking hours over a lifetime)
  const ACTIVITIES = [
    { name: '😴 睡眠', pct: 0.33, color: '#a29bfe' },
    { name: '💼 工作', pct: 0.13, color: '#5f27cd' },
    { name: '📱 刷手机', pct: 0.08, color: '#ff6348' },
    { name: '🍽️ 吃饭', pct: 0.05, color: '#ffa502' },
    { name: '🚗 通勤', pct: 0.03, color: '#747d8c' },
    { name: '📺 娱乐', pct: 0.06, color: '#ff9ff3' },
    { name: '📚 学习', pct: 0.03, color: '#54a0ff' },
    { name: '🧹 家务', pct: 0.03, color: '#2ed573' },
    { name: '❤️ 陪伴爱人', pct: 0.02, color: '#ff6b6b' },
    { name: '🏃 运动', pct: 0.02, color: '#4ecdc4' },
    { name: '✨ 自由时间', pct: 0.22, color: '#ffe66d' }
  ];

  let milestones = [];
  let currentBirthday = null;
  let currentLifespan = 80;

  function getStage(age) {
    for (let stage of STAGES) {
      if (age < stage.maxAge) return stage;
    }
    return STAGES[STAGES.length - 1];
  }

  function generateGrid() {
    const birthdayInput = document.getElementById('birthday').value;
    const lifespanInput = parseInt(document.getElementById('lifespan').value);

    if (!birthdayInput) { alert('请输入生日！'); return; }

    const birthday = new Date(birthdayInput);
    const lifespan = lifespanInput || 80;
    currentBirthday = birthday;
    currentLifespan = lifespan;

    const now = new Date();
    const totalWeeks = lifespan * WEEKS_PER_YEAR;
    const weeksLived = Math.floor((now - birthday) / (7 * 24 * 60 * 60 * 1000));
    const daysLived = Math.floor((now - birthday) / (24 * 60 * 60 * 1000));
    const weeksRemaining = totalWeeks - weeksLived;
    const percentage = ((weeksLived / totalWeeks) * 100).toFixed(1);
    const heartbeats = ((daysLived * 24 * 60 * 80) / 100000000).toFixed(1);

    document.getElementById('statLived').textContent = weeksLived.toLocaleString();
    document.getElementById('statRemaining').textContent = weeksRemaining.toLocaleString();
    document.getElementById('statPercentage').textContent = percentage + '%';
    document.getElementById('statDays').textContent = daysLived.toLocaleString();
    document.getElementById('statHeartbeats').textContent = heartbeats + '亿';

    // Build grid
    const gridEl = document.getElementById('grid');
    const yearLabelsEl = document.getElementById('yearLabels');
    gridEl.innerHTML = '';
    yearLabelsEl.innerHTML = '';

    for (let year = 0; year < lifespan; year += 5) {
      const label = document.createElement('div');
      label.className = 'year-label';
      label.textContent = year + '岁';
      yearLabelsEl.appendChild(label);
    }

    for (let year = 0; year < lifespan; year++) {
      const row = document.createElement('div');
      row.className = 'grid-row';
      const rowLabel = document.createElement('div');
      rowLabel.className = 'row-label';
      if (year % 5 === 0) rowLabel.textContent = year;
      row.appendChild(rowLabel);

      const stage = getStage(year);

      for (let week = 0; week < WEEKS_PER_YEAR; week++) {
        const pixel = document.createElement('div');
        pixel.className = 'pixel';
        const weekIndex = year * WEEKS_PER_YEAR + week;

        if (weekIndex < weeksLived) {
          if (weekIndex >= weeksLived - 1) {
            pixel.classList.add('current');
          } else {
            pixel.classList.add(stage.class);
          }
        }

        const weekStart = new Date(birthday.getTime() + weekIndex * 7 * 24 * 60 * 60 * 1000);
        const weekEnd = new Date(weekStart.getTime() + 7 * 24 * 60 * 60 * 1000);
        for (let m of milestones) {
          const mDate = new Date(m.date);
          if (mDate >= weekStart && mDate < weekEnd) {
            pixel.classList.add('milestone');
            pixel.dataset.milestone = m.text;
            break;
          }
        }

        pixel.addEventListener('mouseenter', (e) => showTooltip(e, weekIndex, year, week, stage));
        pixel.addEventListener('mouseleave', hideTooltip);
        row.appendChild(pixel);
      }
      gridEl.appendChild(row);
    }

    // Activity breakdown
    renderActivityBars(weeksLived);

    // Show sections
    document.getElementById('statsBar').classList.add('visible');
    document.getElementById('gridSection').classList.add('visible');
    document.getElementById('legend').classList.add('visible');
    document.getElementById('activitySection').classList.add('visible');
    document.getElementById('milestoneSection').classList.add('visible');
    document.getElementById('quoteSection').classList.add('visible');
    document.getElementById('shareSection').classList.add('visible');

    const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quote').textContent = '"' + quote.text + '"';
    document.getElementById('quoteAuthor').textContent = '— ' + quote.author;

    document.getElementById('gridSection').scrollIntoView({ behavior: 'smooth' });
  }

  function renderActivityBars(weeksLived) {
    const container = document.getElementById('activityBars');
    container.innerHTML = '';

    ACTIVITIES.forEach(act => {
      const weeks = Math.round(weeksLived * act.pct);
      const bar = document.createElement('div');
      bar.className = 'activity-bar';
      bar.innerHTML = `
        <div class="name">${act.name}</div>
        <div class="bar-container">
          <div class="bar-fill" style="width: 0%; background: ${act.color};" data-width="${(act.pct * 100).toFixed(0)}%">${(act.pct * 100).toFixed(0)}%</div>
        </div>
        <div class="weeks">≈ ${weeks.toLocaleString()} 周</div>
      `;
      container.appendChild(bar);
    });

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width;
      });
    }, 300);
  }

  function showTooltip(e, weekIndex, year, week, stage) {
    const tooltip = document.getElementById('tooltip');
    const milestoneText = e.target.dataset.milestone;

    document.getElementById('tooltipWeek').textContent = `第 ${weekIndex + 1} 周`;
    document.getElementById('tooltipAge').textContent = `${year}岁 第${week + 1}周`;
    document.getElementById('tooltipStage').textContent = milestoneText ? `⭐ ${milestoneText}` : `阶段：${stage.name}`;

    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }

  function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
  }

  function addMilestone() {
    const dateInput = document.getElementById('milestoneDate').value;
    const textInput = document.getElementById('milestoneText').value.trim();
    if (!dateInput || !textInput) { alert('请填写日期和事件描述！'); return; }
    milestones.push({ date: dateInput, text: textInput });
    renderMilestones();
    if (currentBirthday) generateGrid();
    document.getElementById('milestoneDate').value = '';
    document.getElementById('milestoneText').value = '';
  }

  function removeMilestone(index) {
    milestones.splice(index, 1);
    renderMilestones();
    if (currentBirthday) generateGrid();
  }

  function renderMilestones() {
    document.getElementById('milestoneList').innerHTML = milestones.map((m, i) => `
      <div class="milestone-tag">
        <span>${m.date} - ${m.text}</span>
        <span class="remove" onclick="removeMilestone(${i})">✕</span>
      </div>
    `).join('');
  }

  function shareResult() {
    const lived = document.getElementById('statLived').textContent;
    const remaining = document.getElementById('statRemaining').textContent;
    const pct = document.getElementById('statPercentage').textContent;
    const text = `🔲 Life in Pixels\n\n我已度过 ${lived} 周\n还剩 ${remaining} 周\n人生进度：${pct}\n\n每个格子代表一周，看看你的人生还剩多少？\n👉 https://knight0940.github.io/life-in-pixels/`;
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板，去分享吧！'));
  }

  function downloadImage() {
    alert('截图功能：请使用系统截图工具 (Cmd+Shift+4 on Mac / Win+Shift+S on Windows) 截取网格区域');
  }

  function resetAll() {
    milestones = [];
    currentBirthday = null;
    ['statsBar','gridSection','legend','activitySection','milestoneSection','quoteSection','shareSection'].forEach(id => {
      document.getElementById(id).classList.remove('visible');
    });
    document.getElementById('milestoneList').innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.addEventListener('load', () => setTimeout(generateGrid, 500));
</script>

</body>
</html>
