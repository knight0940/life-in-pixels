<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life in Pixels — 你的人生像素</title>
<meta name="description" content="每个格子代表你生命中的一周。直观感受时间的流逝，珍惜每一刻。">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --bg-panel: #0f1011;
    --bg-surface: #191a1b;
    --bg-elevated: #28282c;
    --text-primary: #f7f8f8;
    --text-secondary: #d0d6e0;
    --text-tertiary: #8a8f98;
    --text-muted: #62666d;
    --accent: #7170ff;
    --accent-bg: #5e6ad2;
    --accent-hover: #828fff;
    --accent-glow: rgba(113, 112, 255, 0.15);
    --border-subtle: rgba(255, 255, 255, 0.05);
    --border-standard: rgba(255, 255, 255, 0.08);
    --stage-childhood: #ff9ff3;
    --stage-student: #54a0ff;
    --stage-work: #5f27cd;
    --stage-retired: #01a3a4;
    --stage-unlived: rgba(255, 255, 255, 0.04);
    --pixel-size: 10px;
    --gap: 2px;
  }

  /* ===== Light Mode (标准模式) ===== */
  html[data-theme="light"] {
    --bg: #f5f5f7;
    --bg-panel: #ffffff;
    --bg-surface: #f0f0f2;
    --bg-elevated: #e8e8ec;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --text-muted: #aeaeb2;
    --accent: #5856d6;
    --accent-bg: #5856d6;
    --accent-hover: #7472e8;
    --accent-glow: rgba(88, 86, 214, 0.15);
    --border-subtle: rgba(0, 0, 0, 0.06);
    --border-standard: rgba(0, 0, 0, 0.1);
    --stage-childhood: #e84393;
    --stage-student: #2e86de;
    --stage-work: #6c5ce7;
    --stage-retired: #00b894;
    --stage-unlived: rgba(0, 0, 0, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-feature-settings: "cv01", "ss03";
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* ===== Particle Canvas ===== */
  #particleCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }
  .container { position: relative; z-index: 1; }

  /* ===== Theme Toggle Button ===== */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-panel);
    border: 1px solid var(--border-standard);
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  }
  .theme-toggle:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    border-color: var(--accent);
  }
  .theme-toggle:active {
    transform: scale(0.95);
  }

  /* Light mode overrides for cards & panels */
  html[data-theme="light"] .input-section,
  html[data-theme="light"] .grid-container,
  html[data-theme="light"] .activity-section,
  html[data-theme="light"] .milestone-section {
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  }
  html[data-theme="light"] .stat-card:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  }
  html[data-theme="light"] .btn:hover {
    box-shadow: 0 4px 16px rgba(88, 86, 214, 0.3);
  }
  html[data-theme="light"] .tooltip {
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
  }
  html[data-theme="light"] .pixel.milestone {
    box-shadow: 0 0 8px rgba(255, 230, 109, 0.6);
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 80px 24px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 64px;
  }
  .header h1 {
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -2.5px;
    line-height: 1.0;
    background: linear-gradient(135deg, var(--text-primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .header .subtitle {
    font-size: 18px;
    color: var(--text-tertiary);
    font-weight: 400;
    letter-spacing: -0.165px;
  }

  /* Input Section */
  .input-section {
    text-align: center;
    margin-bottom: 48px;
    padding: 32px;
    background: var(--bg-panel);
    border-radius: 12px;
    border: 1px solid var(--border-standard);
  }
  .input-section label {
    font-size: 15px;
    color: var(--text-tertiary);
    display: block;
    margin-bottom: 20px;
    font-weight: 400;
  }
  .input-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .input-row input[type="date"],
  .input-row input[type="number"] {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-standard);
    color: var(--text-primary);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 160px;
  }
  .input-row input:focus {
    border-color: var(--accent);
    box-shadow: var(--accent-glow) 0px 0px 0px 3px;
  }
  .input-row input[type="number"] { width: 100px; }

  .btn {
    background: var(--accent-bg);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 100px;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.15px;
  }
  .btn:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(113, 112, 255, 0.3);
  }
  .btn:active { transform: translateY(0); }

  /* Stats Bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .stats-bar.visible { opacity: 1; transform: translateY(0); }

  .stat-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    transition: all 0.2s;
  }
  .stat-card:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--border-standard);
    transform: translateY(-2px);
  }
  .stat-card .number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .stat-card.lived .number { color: var(--accent); }
  .stat-card.remaining .number { color: #4ecdc4; }
  .stat-card.percentage .number { color: #ffe66d; }
  .stat-card.days .number { color: #a29bfe; }
  .stat-card.heartbeats .number { color: #ff6348; }

  /* Grid Section */
  .grid-section {
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
  }
  .grid-section.visible { opacity: 1; transform: translateY(0); }

  .grid-container {
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border-standard);
    padding: 32px;
    overflow-x: auto;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3);
  }

  .year-labels {
    display: flex;
    margin-bottom: 8px;
    padding-left: 48px;
  }
  .year-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    width: calc(var(--pixel-size) * 52 + var(--gap) * 51);
    min-width: calc(var(--pixel-size) * 52 + var(--gap) * 51);
    text-align: left;
    font-weight: 400;
  }

  .grid-row {
    display: flex;
    align-items: center;
    margin-bottom: var(--gap);
  }
  .row-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    width: 40px;
    min-width: 40px;
    text-align: right;
    padding-right: 8px;
    font-weight: 400;
  }

  .pixel {
    width: var(--pixel-size);
    height: var(--pixel-size);
    min-width: var(--pixel-size);
    border-radius: 2px;
    background: var(--stage-unlived);
    transition: all 0.15s ease;
    cursor: pointer;
    position: relative;
  }
  .pixel:hover {
    transform: scale(2);
    z-index: 10;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
    border-radius: 3px;
  }
  .pixel + .pixel { margin-left: var(--gap); }
  .pixel.childhood { background: var(--stage-childhood); }
  .pixel.student { background: var(--stage-student); }
  .pixel.work { background: var(--stage-work); }
  .pixel.retired { background: var(--stage-retired); }
  .pixel.milestone {
    background: #ffe66d !important;
    box-shadow: 0 0 8px rgba(255, 230, 109, 0.4);
  }
  .pixel.current {
    animation: pulse 2s infinite;
    background: var(--accent) !important;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent-glow); }
    50% { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(113, 112, 255, 0.2); }
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--bg-surface);
    border: 1px solid var(--border-standard);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    pointer-events: none;
    z-index: 1000;
    display: none;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    max-width: 250px;
  }
  .tooltip .week-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .tooltip .age-info {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 4px;
  }
  .tooltip .stage-info {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    opacity: 0;
    transition: opacity 0.6s 0.2s;
  }
  .legend.visible { opacity: 1; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* Activity Section */
  .activity-section {
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border-standard);
    padding: 32px;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
  }
  .activity-section.visible { opacity: 1; transform: translateY(0); }
  .activity-section h3 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 24px;
    letter-spacing: -0.3px;
  }
  .activity-bars { display: flex; flex-direction: column; gap: 14px; }
  .activity-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .activity-bar .name {
    width: 90px;
    min-width: 90px;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
    font-weight: 400;
  }
  .activity-bar .bar-container {
    flex: 1;
    height: 28px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .activity-bar .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    padding-left: 12px;
    font-size: 11px;
    font-weight: 600;
    color: white;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .activity-bar .weeks {
    width: 100px;
    min-width: 100px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: left;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
  }

  /* Milestone Section */
  .milestone-section {
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border-standard);
    padding: 32px;
    margin-bottom: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
  }
  .milestone-section.visible { opacity: 1; transform: translateY(0); }
  .milestone-section h3 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }
  .milestone-input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .milestone-input-row input {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-standard);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .milestone-input-row input:focus {
    border-color: var(--accent);
    box-shadow: var(--accent-glow) 0px 0px 0px 3px;
  }
  .milestone-input-row input[type="text"] { flex: 1; min-width: 180px; }
  .milestone-list { display: flex; flex-wrap: wrap; gap: 10px; }
  .milestone-tag {
    background: rgba(113, 112, 255, 0.08);
    border: 1px solid rgba(113, 112, 255, 0.2);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 400;
  }
  .milestone-tag .remove {
    cursor: pointer;
    opacity: 0.5;
    font-size: 12px;
    transition: opacity 0.2s;
  }
  .milestone-tag .remove:hover { opacity: 1; }

  /* Quote */
  .quote-section {
    text-align: center;
    margin-top: 64px;
    padding: 40px;
    opacity: 0;
    transition: opacity 0.6s 0.4s;
  }
  .quote-section.visible { opacity: 1; }
  .quote-section .quote {
    font-size: 22px;
    font-style: italic;
    color: var(--text-tertiary);
    max-width: 600px;
    margin: 0 auto 12px;
    line-height: 1.6;
    letter-spacing: -0.3px;
  }
  .quote-section .author {
    font-size: 14px;
    color: var(--accent);
    font-weight: 400;
  }

  /* Share Section */
  .share-section {
    text-align: center;
    margin-top: 32px;
    opacity: 0;
    transition: opacity 0.6s 0.5s;
  }
  .share-section.visible { opacity: 1; }
  .share-btn {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border-standard);
    color: var(--text-secondary);
    padding: 12px 28px;
    border-radius: 100px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    transition: all 0.2s;
    margin: 6px;
    letter-spacing: -0.1px;
  }
  .share-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--accent);
    color: var(--text-primary);
    transform: translateY(-1px);
  }

  .footer {
    text-align: center;
    margin-top: 64px;
    padding: 24px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--border-subtle);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: var(--accent-hover); }

  @media (max-width: 768px) {
    .container { padding: 48px 16px; }
    .header h1 { font-size: 36px; letter-spacing: -1.5px; }
    .header .subtitle { font-size: 16px; }
    :root { --pixel-size: 7px; --gap: 1.5px; }
    .year-label, .row-label { font-size: 8px; }
    .row-label { width: 28px; min-width: 28px; }
    .year-labels { padding-left: 32px; }
    .stat-card .number { font-size: 22px; }
    .activity-bar .name { width: 70px; min-width: 70px; font-size: 12px; }
    .activity-bar .weeks { width: 80px; min-width: 80px; font-size: 11px; }
    .grid-container { padding: 20px; }
    .activity-section, .milestone-section { padding: 24px; }
    .theme-toggle { width: 40px; height: 40px; font-size: 16px; top: 12px; right: 12px; }
  }
</style>
</head>
<body>

<!-- Particle Background Canvas -->
<canvas id="particleCanvas"></canvas>

<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>

<div class="container">
  <div class="header">
    <h1>LIFE IN PIXELS</h1>
    <p class="subtitle">每个格子代表你生命中的一周 · 直观感受时间的流逝</p>
  </div>

  <div class="input-section">
    <label>输入你的生日和期望寿命，看看你的人生还剩多少格子</label>
    <div class="input-row">
      <input type="date" id="birthday" value="1995-06-15">
      <input type="number" id="lifespan" value="80" min="1" max="150" placeholder="期望寿命">
      <span style="color: var(--text-muted); font-size: 14px;">岁</span>
      <button class="btn" onclick="generateGrid()">生成我的人生</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card lived">
      <div class="number" id="statLived">0</div>
      <div class="label">已度过（周）</div>
    </div>
    <div class="stat-card remaining">
      <div class="number" id="statRemaining">0</div>
      <div class="label">剩余（周）</div>
    </div>
    <div class="stat-card percentage">
      <div class="number" id="statPercentage">0%</div>
      <div class="label">人生进度</div>
    </div>
    <div class="stat-card days">
      <div class="number" id="statDays">0</div>
      <div class="label">已活天数</div>
    </div>
    <div class="stat-card heartbeats">
      <div class="number" id="statHeartbeats">0</div>
      <div class="label">约心跳次数（亿）</div>
    </div>
  </div>

  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-childhood);"></div><span>童年 (0-12)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-student);"></div><span>学生 (13-22)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-work);"></div><span>工作 (23-60)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-retired);"></div><span>退休 (60+)</span></div>
    <div class="legend-item"><div class="legend-color" style="background: #ffe66d; box-shadow: 0 0 6px rgba(255,230,109,0.4);"></div><span>里程碑</span></div>
    <div class="legend-item"><div class="legend-color" style="background: var(--stage-unlived); border: 1px solid rgba(255,255,255,0.1);"></div><span>未经历</span></div>
  </div>

  <div class="grid-section" id="gridSection">
    <div class="grid-container">
      <div class="year-labels" id="yearLabels"></div>
      <div id="grid"></div>
    </div>
  </div>

  <div class="activity-section" id="activitySection">
    <h3>⏰ 你的时间都去哪了？</h3>
    <div class="activity-bars" id="activityBars"></div>
  </div>

  <div class="milestone-section" id="milestoneSection">
    <h3>⭐ 添加人生里程碑</h3>
    <div class="milestone-input-row">
      <input type="date" id="milestoneDate">
      <input type="text" id="milestoneText" placeholder="事件描述（如：大学毕业）">
      <button class="btn" onclick="addMilestone()" style="padding: 10px 24px; font-size: 14px;">添加</button>
    </div>
    <div class="milestone-list" id="milestoneList"></div>
  </div>

  <div class="quote-section" id="quoteSection">
    <div class="quote" id="quote"></div>
    <div class="author" id="quoteAuthor"></div>
  </div>

  <div class="share-section" id="shareSection">
    <button class="share-btn" onclick="shareResult()">📊 复制分享</button>
    <button class="share-btn" onclick="resetAll()">🔄 重新开始</button>
  </div>

  <div class="footer">
    <p>Life in Pixels — 珍惜每一周 ❤️ · <a href="https://github.com/knight0940/life-in-pixels" target="_blank">GitHub</a></p>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="week-num" id="tooltipWeek"></div>
  <div class="age-info" id="tooltipAge"></div>
  <div class="stage-info" id="tooltipStage"></div>
</div>

<script>
  const WEEKS_PER_YEAR = 52;
  const STAGES = [
    { name: '童年', maxAge: 12, class: 'childhood' },
    { name: '学生', maxAge: 22, class: 'student' },
    { name: '工作', maxAge: 60, class: 'work' },
    { name: '退休', maxAge: 999, class: 'retired' }
  ];

  const QUOTES = [
    { text: "你不能控制生命的长度，但可以拓展它的宽度。", author: "佚名" },
    { text: "人生天地之间，若白驹过隙，忽然而已。", author: "庄子" },
    { text: "把每一天当作生命的最后一天来过，终有一天你会自在从容。", author: "乔布斯" },
    { text: "生命的价值不在于活了多少天，而在于我们如何度过这些日子。", author: "加缪" },
    { text: "一万年太久，只争朝夕。", author: "毛泽东" },
    { text: "逝者如斯夫，不舍昼夜。", author: "孔子" },
    { text: "你所浪费的今天，是昨天死去的人奢望的明天。", author: "佚名" }
  ];

  const ACTIVITIES = [
    { name: '😴 睡眠', pct: 0.33, color: '#a29bfe' },
    { name: '💼 工作', pct: 0.13, color: '#5f27cd' },
    { name: '📱 刷手机', pct: 0.08, color: '#ff6348' },
    { name: '🍽️ 吃饭', pct: 0.05, color: '#ffa502' },
    { name: '🚗 通勤', pct: 0.03, color: '#747d8c' },
    { name: '📺 娱乐', pct: 0.06, color: '#ff9ff3' },
    { name: '📚 学习', pct: 0.03, color: '#54a0ff' },
    { name: '🧹 家务', pct: 0.03, color: '#2ed573' },
    { name: '❤️ 陪伴', pct: 0.02, color: '#ff6b6b' },
    { name: '🏃 运动', pct: 0.02, color: '#4ecdc4' },
    { name: '✨ 自由', pct: 0.22, color: '#ffe66d' }
  ];

  let milestones = [];
  let currentBirthday = null;
  let currentLifespan = 80;

  function getStage(age) {
    for (let stage of STAGES) {
      if (age < stage.maxAge) return stage;
    }
    return STAGES[STAGES.length - 1];
  }

  function generateGrid() {
    const birthdayInput = document.getElementById('birthday').value;
    const lifespanInput = parseInt(document.getElementById('lifespan').value);
    if (!birthdayInput) { alert('请输入生日！'); return; }

    const birthday = new Date(birthdayInput);
    const lifespan = lifespanInput || 80;
    currentBirthday = birthday;
    currentLifespan = lifespan;

    const now = new Date();
    const totalWeeks = lifespan * WEEKS_PER_YEAR;
    const weeksLived = Math.floor((now - birthday) / (7 * 24 * 60 * 60 * 1000));
    const daysLived = Math.floor((now - birthday) / (24 * 60 * 60 * 1000));
    const weeksRemaining = totalWeeks - weeksLived;
    const percentage = ((weeksLived / totalWeeks) * 100).toFixed(1);
    const heartbeats = ((daysLived * 24 * 60 * 80) / 100000000).toFixed(1);

    document.getElementById('statLived').textContent = weeksLived.toLocaleString();
    document.getElementById('statRemaining').textContent = weeksRemaining.toLocaleString();
    document.getElementById('statPercentage').textContent = percentage + '%';
    document.getElementById('statDays').textContent = daysLived.toLocaleString();
    document.getElementById('statHeartbeats').textContent = heartbeats + '亿';

    const gridEl = document.getElementById('grid');
    const yearLabelsEl = document.getElementById('yearLabels');
    gridEl.innerHTML = '';
    yearLabelsEl.innerHTML = '';

    for (let year = 0; year < lifespan; year += 5) {
      const label = document.createElement('div');
      label.className = 'year-label';
      label.textContent = year + '岁';
      yearLabelsEl.appendChild(label);
    }

    for (let year = 0; year < lifespan; year++) {
      const row = document.createElement('div');
      row.className = 'grid-row';
      const rowLabel = document.createElement('div');
      rowLabel.className = 'row-label';
      if (year % 5 === 0) rowLabel.textContent = year;
      row.appendChild(rowLabel);

      const stage = getStage(year);
      for (let week = 0; week < WEEKS_PER_YEAR; week++) {
        const pixel = document.createElement('div');
        pixel.className = 'pixel';
        const weekIndex = year * WEEKS_PER_YEAR + week;

        if (weekIndex < weeksLived) {
          if (weekIndex >= weeksLived - 1) {
            pixel.classList.add('current');
          } else {
            pixel.classList.add(stage.class);
          }
        }

        const weekStart = new Date(birthday.getTime() + weekIndex * 7 * 24 * 60 * 60 * 1000);
        const weekEnd = new Date(weekStart.getTime() + 7 * 24 * 60 * 60 * 1000);
        for (let m of milestones) {
          const mDate = new Date(m.date);
          if (mDate >= weekStart && mDate < weekEnd) {
            pixel.classList.add('milestone');
            pixel.dataset.milestone = m.text;
            break;
          }
        }

        pixel.addEventListener('mouseenter', (e) => showTooltip(e, weekIndex, year, week, stage));
        pixel.addEventListener('mouseleave', hideTooltip);
        row.appendChild(pixel);
      }
      gridEl.appendChild(row);
    }

    renderActivityBars(weeksLived);

    ['statsBar', 'gridSection', 'legend', 'activitySection', 'milestoneSection', 'quoteSection', 'shareSection'].forEach(id => {
      document.getElementById(id).classList.add('visible');
    });

    const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById('quote').textContent = '"' + quote.text + '"';
    document.getElementById('quoteAuthor').textContent = '— ' + quote.author;

    document.getElementById('gridSection').scrollIntoView({ behavior: 'smooth' });
  }

  function renderActivityBars(weeksLived) {
    const container = document.getElementById('activityBars');
    container.innerHTML = '';
    ACTIVITIES.forEach(act => {
      const weeks = Math.round(weeksLived * act.pct);
      const bar = document.createElement('div');
      bar.className = 'activity-bar';
      bar.innerHTML = `
        <div class="name">${act.name}</div>
        <div class="bar-container">
          <div class="bar-fill" style="width: 0%; background: ${act.color};" data-width="${(act.pct * 100).toFixed(0)}%">${(act.pct * 100).toFixed(0)}%</div>
        </div>
        <div class="weeks">≈ ${weeks.toLocaleString()} 周</div>
      `;
      container.appendChild(bar);
    });
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width;
      });
    }, 300);
  }

  function showTooltip(e, weekIndex, year, week, stage) {
    const tooltip = document.getElementById('tooltip');
    const milestoneText = e.target.dataset.milestone;
    document.getElementById('tooltipWeek').textContent = `第 ${weekIndex + 1} 周`;
    document.getElementById('tooltipAge').textContent = `${year}岁 第${week + 1}周`;
    document.getElementById('tooltipStage').textContent = milestoneText ? `⭐ ${milestoneText}` : `阶段：${stage.name}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }

  function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
  }

  function addMilestone() {
    const dateInput = document.getElementById('milestoneDate').value;
    const textInput = document.getElementById('milestoneText').value.trim();
    if (!dateInput || !textInput) { alert('请填写日期和事件描述！'); return; }
    milestones.push({ date: dateInput, text: textInput });
    renderMilestones();
    if (currentBirthday) generateGrid();
    document.getElementById('milestoneDate').value = '';
    document.getElementById('milestoneText').value = '';
  }

  function removeMilestone(index) {
    milestones.splice(index, 1);
    renderMilestones();
    if (currentBirthday) generateGrid();
  }

  function renderMilestones() {
    document.getElementById('milestoneList').innerHTML = milestones.map((m, i) => `
      <div class="milestone-tag">
        <span>${m.date} - ${m.text}</span>
        <span class="remove" onclick="removeMilestone(${i})">✕</span>
      </div>
    `).join('');
  }

  function shareResult() {
    const lived = document.getElementById('statLived').textContent;
    const remaining = document.getElementById('statRemaining').textContent;
    const pct = document.getElementById('statPercentage').textContent;
    const text = `🔲 Life in Pixels\n\n我已度过 ${lived} 周\n还剩 ${remaining} 周\n人生进度：${pct}\n\n每个格子代表一周，看看你的人生还剩多少？\n👉 https://knight0940.github.io/life-in-pixels/`;
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板，去分享吧！'));
  }

  function resetAll() {
    milestones = [];
    currentBirthday = null;
    ['statsBar', 'gridSection', 'legend', 'activitySection', 'milestoneSection', 'quoteSection', 'shareSection'].forEach(id => {
      document.getElementById(id).classList.remove('visible');
    });
    document.getElementById('milestoneList').innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.addEventListener('load', () => setTimeout(generateGrid, 500));

  // ===== Theme Toggle =====
  function toggleTheme() {
    const html = document.documentElement;
    const btn = document.getElementById('themeToggle');
    if (html.getAttribute('data-theme') === 'light') {
      html.removeAttribute('data-theme');
      btn.textContent = '🌙';
      btn.title = '切换到标准模式';
      localStorage.setItem('theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '☀️';
      btn.title = '切换到暗夜模式';
      localStorage.setItem('theme', 'light');
    }
    // Update particle colors for the new theme
    if (window.updateParticleTheme) window.updateParticleTheme();
  }

  // Restore saved theme
  (function() {
    const saved = localStorage.getItem('theme');
    if (saved === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      const btn = document.getElementById('themeToggle');
      if (btn) { btn.textContent = '☀️'; btn.title = '切换到暗夜模式'; }
    }
  })();

  // ===== Pixel Particle Background (Trae-style) =====
  (function() {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let w, h;
    let mouse = { x: -1000, y: -1000 };

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    function isLight() {
      return document.documentElement.getAttribute('data-theme') === 'light';
    }

    function getParticleColor(alpha) {
      if (isLight()) {
        return `rgba(88, 86, 214, ${alpha})`;
      }
      // Dark mode: mix of green (Trae) and accent purple
      const colors = [
        `rgba(0, 255, 136, ${alpha})`,   // Trae green
        `rgba(0, 212, 170, ${alpha})`,   // teal
        `rgba(113, 112, 255, ${alpha})`, // accent purple
        `rgba(0, 255, 200, ${alpha})`,   // cyan-green
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 3 + 1;
        this.baseAlpha = Math.random() * 0.4 + 0.1;
        this.alpha = this.baseAlpha;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.pulseSpeed = Math.random() * 0.02 + 0.005;
        this.pulseOffset = Math.random() * Math.PI * 2;
        this.isGreen = Math.random() > 0.3; // 70% chance green, 30% accent
        this.connections = [];
      }
      update(time) {
        this.x += this.vx;
        this.y += this.vy;
        // Pulse alpha
        this.alpha = this.baseAlpha + Math.sin(time * this.pulseSpeed + this.pulseOffset) * 0.15;
        // Wrap around
        if (this.x < -10) this.x = w + 10;
        if (this.x > w + 10) this.x = -10;
        if (this.y < -10) this.y = h + 10;
        if (this.y > h + 10) this.y = -10;
        // Mouse repel
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const force = (120 - dist) / 120 * 0.8;
          this.x += (dx / dist) * force;
          this.y += (dy / dist) * force;
        }
      }
      draw() {
        const light = isLight();
        const a = Math.max(0, this.alpha);
        if (this.isGreen) {
          if (light) {
            ctx.fillStyle = `rgba(88, 86, 214, ${a})`;
          } else {
            ctx.fillStyle = `rgba(0, 255, 136, ${a})`;
            // Glow
            ctx.shadowColor = 'rgba(0, 255, 136, 0.5)';
            ctx.shadowBlur = this.size * 3;
          }
        } else {
          if (light) {
            ctx.fillStyle = `rgba(88, 86, 214, ${a * 0.6})`;
          } else {
            ctx.fillStyle = `rgba(113, 112, 255, ${a})`;
            ctx.shadowColor = 'rgba(113, 112, 255, 0.4)';
            ctx.shadowBlur = this.size * 2;
          }
        }
        // Draw pixel-style square
        ctx.fillRect(
          Math.round(this.x - this.size / 2),
          Math.round(this.y - this.size / 2),
          this.size,
          this.size
        );
        ctx.shadowBlur = 0;
      }
    }

    function init() {
      resize();
      particles = [];
      const count = Math.min(Math.floor((w * h) / 8000), 200);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function drawConnections() {
      const light = isLight();
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            const alpha = (1 - dist / 100) * 0.08;
            ctx.strokeStyle = light
              ? `rgba(88, 86, 214, ${alpha})`
              : `rgba(0, 255, 136, ${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }

    let time = 0;
    function animate() {
      ctx.clearRect(0, 0, w, h);
      time++;
      drawConnections();
      particles.forEach(p => {
        p.update(time);
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      // Re-adjust particle count
      const targetCount = Math.min(Math.floor((w * h) / 8000), 200);
      while (particles.length < targetCount) particles.push(new Particle());
      while (particles.length > targetCount) particles.pop();
    });

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.updateParticleTheme = function() {
      // Particles auto-adapt via isLight() checks in draw()
    };

    init();
    animate();
  })();
</script>

</body>
</html>
